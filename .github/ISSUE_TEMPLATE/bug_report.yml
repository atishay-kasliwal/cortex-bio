name: Bug report
description: Report something broken in Cortex Bio
title: "[bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. Include steps to reproduce and your environment.

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - API (/v1)
        - Self-hosted API (/api)
        - iOS / HealthKit sync
        - Database / migrations
        - SDK (TypeScript)
        - SDK (Python)
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: Clear description of the bug
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version or commit SHA
      placeholder: e.g. main @ abc1234

  - type: textarea
    id: logs
    attributes:
      label: Logs or curl output
      render: shell
