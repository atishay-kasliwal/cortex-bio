name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prisma-validate:
    name: Prisma Validation
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: db
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: db/package-lock.json
      - run: npm ci
      - run: npx prisma validate
      - run: npx prisma generate

  api-build:
    name: API Build
    needs: prisma-validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci?schema=public
      API_KEY_PEPPER: ci-test-pepper-min-8-chars
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install db + generate client
        working-directory: db
        run: |
          npm ci
          npx prisma generate
      - run: npm ci
      - run: npm run build

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      VITE_API_URL: https://api.cortex.bio
      VITE_DOCS_API_URL: https://api.cortex.bio
      VITE_SUPABASE_URL: https://example.supabase.co
      VITE_SUPABASE_PUBLISHABLE_KEY: ci-placeholder-anon-key
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build

  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint

  security-audit:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: chmod +x scripts/security-audit.sh && ./scripts/security-audit.sh
