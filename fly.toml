# Fly.io — Cortex Bio API (api.atriveo.com)
# Deploy from repo root: fly deploy --config fly.toml

app = 'cortex-bio-api'
primary_region = 'iad'

[build]
  dockerfile = 'api/Dockerfile'

[env]
  PORT = '8000'
  PUBLIC_API_URL = 'https://api.atriveo.com'
  FEATURE_FORECASTING = 'true'
  FEATURE_ML = 'true'
  FEATURE_CORTEX = 'true'
  FEATURE_ORGANIZATIONS = 'false'
  CORS_ORIGINS = 'https://bio.atriveo.com,https://preview.bio.atriveo.com'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = '20s'
    interval = '30s'
    method = 'GET'
    path = '/health'
    timeout = '5s'

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
